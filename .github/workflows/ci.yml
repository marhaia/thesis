name: CI

on:
  push:
    branches:
      - main
      - "fix/**"
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Smoke & regression tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: pip

      - name: Install lightweight test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Run pytest
        # Runs the CI-light-safe test files: smoke + canonical-scale + the
        # non-real-checkpoint saliency-integrity tests. These are NOT the entire
        # repository test suite: cognitive/test_jokinen.py, tests/test_pipeline.py
        # and saliency/test_full_pipeline.py exist too but need the heavy ML
        # stack and are not run in this lightweight job. TensorFlow-dependent
        # integrity tests (postprocess + real-checkpoint) are skipped here
        # because TensorFlow is not installed in requirements-ci.txt.
        run: |
          python -m pytest \
            tests/test_smoke.py \
            tests/test_canonical_scale.py \
            tests/test_saliency_integrity.py \
            -m "not real_checkpoint" -rs -q

  deps-check:
    name: Full requirements resolve (dry run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Dry-run resolve the full runtime stack
        # Catches real dependency conflicts (e.g. an incompatible numpy/opencv
        # pin) without downloading the multi-hundred-MB ML wheels.
        run: |
          python -m pip install --upgrade pip
          pip install --dry-run -r requirements.txt
